# Starter docker-compose for NextStep (Phase 2 DevOps).
# Brings the whole stack up with:  docker compose up --build
version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "4000:4000"
    environment:
      - PORT=4000

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      # Point the browser-side app at the backend service.
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    depends_on:
      - backend
